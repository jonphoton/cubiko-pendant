; ---------------------------------------------------------------
; Two build environments:
;
;   m5dial       (default) — uses StubCncTransport. USB-C stays in
;                CDC device mode so you can flash and monitor over it.
;                Use this until the powered USB-C OTG cable arrives.
;
;   m5dial-cnc            — uses Ch341CncTransport (EspUsbHost). USB-C
;                switches to host mode so the M5Dial enumerates the
;                Cubiko's CH341 chip and streams grbl to it. Once this
;                env is flashed you can no longer monitor over USB-C;
;                debug over WiFi instead.
; ---------------------------------------------------------------

[common]
platform = espressif32@^6.5.0
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
upload_speed = 1500000

build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DCORE_DEBUG_LEVEL=3
  -DDEFAULT_FTP_SERVER_NETWORK_TYPE_ESP32=NETWORK_ESP32
  -DDEFAULT_STORAGE_TYPE_ESP32=STORAGE_LITTLEFS

lib_deps =
  m5stack/M5Dial@^1.0.2
  m5stack/M5Unified@^0.2.2
  xreef/SimpleFTPServer@^2.1.7
  tzapu/WiFiManager@^2.0.17

board_build.partitions = partitions_cubiko.csv
board_build.filesystem = littlefs

[env:m5dial]
extends = common

[env:m5dial-cnc]
; EspUsbHost 2.x needs Arduino-ESP32 3.3+ / IDF 5.5+. Default env stays
; on espressif32 6.x for stability; this env pins to espressif32 7.x.
; USB-OTG goes to host mode for the CH341, so Arduino's device-side
; USB-CDC is disabled — Serial.print() output is unavailable here;
; debug over WiFi instead.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
board_build.partitions = partitions_cubiko.csv
board_build.filesystem = littlefs
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DDEFAULT_FTP_SERVER_NETWORK_TYPE_ESP32=NETWORK_ESP32
  -DDEFAULT_STORAGE_TYPE_ESP32=STORAGE_LITTLEFS
  -DUSE_CH341_TRANSPORT=1
lib_deps =
  m5stack/M5Dial@^1.0.2
  m5stack/M5Unified@^0.2.2
  xreef/SimpleFTPServer@^2.1.7
  tzapu/WiFiManager@^2.0.17
  tanakamasayuki/EspUsbHost@^2.0.1
